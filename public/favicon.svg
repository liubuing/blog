<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a2a55"/>
      <stop offset="0.55" stop-color="#3d2a5c"/>
      <stop offset="1" stop-color="#2a1b3d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5D76E"/>
      <stop offset="1" stop-color="#C99A2E"/>
    </linearGradient>
    <radialGradient id="eye" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFE9A8"/>
      <stop offset="0.45" stop-color="#FF7AAB"/>
      <stop offset="1" stop-color="#7A2A55" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#bg)"/>
  <!-- 卜算第三只眼 -->
  <ellipse cx="32" cy="22" rx="11" ry="6.5" fill="url(#eye)" opacity="0.9"/>
  <circle cx="32" cy="22" r="3.2" fill="#1A1230"/>
  <circle cx="32" cy="22" r="1.8" fill="#FFE9A8"/>
  <circle cx="31.3" cy="21.3" r="0.7" fill="#fff"/>
  <!-- 符字 -->
  <text x="32" y="50" text-anchor="middle" font-family="'Noto Serif SC','Songti SC',serif" font-size="30" font-weight="700" fill="url(#gold)" style="paint-order:stroke;stroke:#1A1230;stroke-width:0.6">符</text>
</svg>
